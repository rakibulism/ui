name: Publish to npm

# Publishes the package whenever a v* tag is pushed, e.g.:
#   npm version patch && git push --follow-tags
#   git tag v0.1.1 && git push origin v0.1.1
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish
        # prepublishOnly re-runs type-check + build; --provenance adds a signed
        # provenance attestation (requires id-token: write above).
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
